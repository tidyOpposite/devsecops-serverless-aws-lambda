name: Publish GitHub Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  publish:
    name: Publish release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Build Python package artifacts
        run: |
          python -m pip install --upgrade pip==26.1.2 build==1.5.0 setuptools==82.0.1 wheel==0.47.0
          python -m build

      - name: Stage installer
        run: |
          cp install.sh dist/install.sh
          chmod 0755 dist/install.sh

      - name: Generate release checksums
        run: |
          cd dist
          sha256sum install.sh *.whl *.tar.gz > SHA256SUMS
          sha256sum -c SHA256SUMS

      - name: Resolve release notes
        id: notes
        run: |
          notes_path="docs/release-${GITHUB_REF_NAME}.md"
          if [ ! -f "${notes_path}" ]; then
            notes_path="CHANGELOG.md"
          fi
          echo "path=${notes_path}" >> "${GITHUB_OUTPUT}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          body_path: ${{ steps.notes.outputs.path }}
          files: |
            dist/install.sh
            dist/*.whl
            dist/*.tar.gz
            dist/SHA256SUMS
          draft: false
          prerelease: false
