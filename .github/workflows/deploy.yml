name: Secure Serverless DevSecOps Pipeline

on:
  pull_request:
    branches:
      - main
  #checkov:skip=CKV_GHA_7:Manual production deploy needs enumerated mode/environment inputs and protected environment approval.
  workflow_dispatch:
    inputs:
      mode:
        description: Run mode
        required: true
        default: plan
        type: choice
        options:
          - plan
          - deploy
      environment:
        description: Terraform workspace
        required: true
        default: dev
        type: choice
        options:
          - dev
          - staging
          - prod

permissions:
  contents: read

concurrency:
  group: terraform-${{ github.event.inputs.environment || 'dev' }}-${{ github.event.inputs.mode || github.event_name }}
  cancel-in-progress: false

env:
  PROJECT_NAME: ${{ vars.PROJECT_NAME || 'devsecops-pipeline' }}
  TF_VERSION: "1.10.5"
  TF_IN_AUTOMATION: "true"
  TF_WORKING_DIR: terraform
  DEPLOY_ENVIRONMENT: ${{ github.event.inputs.environment || 'dev' }}
  LAMBDA_IMAGE_URI: ${{ vars.LAMBDA_IMAGE_URI || '' }}
  API_AUTHORIZATION_TYPE: ${{ vars.API_AUTHORIZATION_TYPE || 'AWS_IAM' }}
  ENABLE_SNYK_SCAN: ${{ vars.ENABLE_SNYK_SCAN || 'false' }}
  ENABLE_HTTP_VALIDATION: ${{ vars.ENABLE_HTTP_VALIDATION || 'false' }}
  ENABLE_DAST: ${{ vars.ENABLE_DAST || 'false' }}

jobs:
  security-and-validate:
    name: Security and Terraform Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform fmt check
        run: terraform -chdir="${TF_WORKING_DIR}" fmt -check -recursive

      - name: Terraform init without backend
        run: terraform -chdir="${TF_WORKING_DIR}" init -backend=false -input=false -no-color

      - name: Terraform validate
        run: terraform -chdir="${TF_WORKING_DIR}" validate -no-color

      - name: Run IaC scan with Trivy
        uses: aquasecurity/trivy-action@c1824fd6edce30d7ab345a9989de00bbd46ef284 # v0.34.0
        with:
          scan-type: config
          scan-ref: ${{ env.TF_WORKING_DIR }}
          version: v0.71.0
          format: table
          exit-code: "1"
          ignore-unfixed: false
          severity: HIGH,CRITICAL

  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: security-and-validate
    if: (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository) || (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'plan')
    permissions:
      contents: read
      id-token: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Require separate AWS plan role
        env:
          PLAN_ROLE_ARN: ${{ secrets.AWS_PLAN_ROLE_TO_ASSUME_ARN }}
        run: |
          if [ -z "${PLAN_ROLE_ARN}" ]; then
            echo "Set AWS_PLAN_ROLE_TO_ASSUME_ARN to a least-privilege plan role. Terraform plan does not fall back to the deploy role." >&2
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ secrets.AWS_PLAN_ROLE_TO_ASSUME_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform init
        run: terraform -chdir="${TF_WORKING_DIR}" init -input=false -no-color

      - name: Select Terraform workspace
        run: |
          terraform -chdir="${TF_WORKING_DIR}" workspace select "${DEPLOY_ENVIRONMENT}" \
            || terraform -chdir="${TF_WORKING_DIR}" workspace new "${DEPLOY_ENVIRONMENT}"

      - name: Terraform plan
        run: |
          terraform -chdir="${TF_WORKING_DIR}" plan \
            -out=tfplan \
            -input=false \
            -no-color \
            -var="api_authorization_type=${API_AUTHORIZATION_TYPE}" \
            -var="project_name=${PROJECT_NAME}"
          terraform -chdir="${TF_WORKING_DIR}" show -no-color tfplan > "${TF_WORKING_DIR}/tfplan.txt"

      - name: Upload Terraform plan artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: terraform-plan-${{ env.DEPLOY_ENVIRONMENT }}
          path: ${{ env.TF_WORKING_DIR }}/tfplan.txt
          retention-days: 14

      - name: Comment Terraform plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          PLAN_PATH: ${{ env.TF_WORKING_DIR }}/tfplan.txt
          PLAN_ENVIRONMENT: ${{ env.DEPLOY_ENVIRONMENT }}
        with:
          script: |
            const fs = require('fs');
            const marker = `<!-- terraform-plan-${process.env.PLAN_ENVIRONMENT} -->`;
            const rawPlan = fs.readFileSync(process.env.PLAN_PATH, 'utf8');
            const plan = rawPlan.length > 60000 ? `${rawPlan.slice(0, 60000)}\n\n[plan truncated]` : rawPlan;
            const body = [
              marker,
              `### Terraform plan: \`${process.env.PLAN_ENVIRONMENT}\``,
              '',
              '<details><summary>Show plan</summary>',
              '',
              '```terraform',
              plan,
              '```',
              '',
              '</details>',
            ].join('\n');

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.rest.issues.listComments({ owner, repo, issue_number, per_page: 100 });
            const existing = comments.data.find(comment => comment.user.type === 'Bot' && comment.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

  deploy-main:
    name: Manual Apply and Deploy Production
    runs-on: ubuntu-latest
    needs: security-and-validate
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'deploy' && github.event.inputs.environment == 'prod' && github.ref == 'refs/heads/main'
    environment: ${{ vars.PROD_APPROVAL_ENVIRONMENT || 'prod' }}
    permissions:
      contents: read
      id-token: write
    env:
      DEPLOY_ENVIRONMENT: prod
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      AWS_REGION: ${{ secrets.AWS_REGION }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Require Lambda image URI
        run: |
          if [ -z "${LAMBDA_IMAGE_URI}" ]; then
            echo "Set repository variable LAMBDA_IMAGE_URI to an immutable Lambda container image URI before deploying." >&2
            exit 1
          fi
          if printf '%s' "${LAMBDA_IMAGE_URI}" | grep -Eq ':(latest|bootstrap)$'; then
            echo "LAMBDA_IMAGE_URI must use an immutable tag or digest, not latest/bootstrap." >&2
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Require Snyk token when scan is enabled
        if: env.ENABLE_SNYK_SCAN == 'true' && env.SNYK_TOKEN == ''
        run: |
          echo "ENABLE_SNYK_SCAN is true, but SNYK_TOKEN is not configured." >&2
          exit 1

      - name: Set up Node.js for Snyk
        if: env.ENABLE_SNYK_SCAN == 'true' && env.SNYK_TOKEN != ''
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"

      - name: Install Snyk CLI
        if: env.ENABLE_SNYK_SCAN == 'true' && env.SNYK_TOKEN != ''
        run: npm install -g snyk

      - name: Login to Amazon ECR for image scan
        if: env.ENABLE_SNYK_SCAN == 'true' && env.SNYK_TOKEN != ''
        uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64 # v2

      - name: Scan configured Lambda image with Snyk
        if: env.ENABLE_SNYK_SCAN == 'true' && env.SNYK_TOKEN != ''
        run: snyk container test "${LAMBDA_IMAGE_URI}" --severity-threshold=high

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform init
        run: terraform -chdir="${TF_WORKING_DIR}" init -input=false -no-color

      - name: Select Terraform workspace
        run: |
          terraform -chdir="${TF_WORKING_DIR}" workspace select "${DEPLOY_ENVIRONMENT}" \
            || terraform -chdir="${TF_WORKING_DIR}" workspace new "${DEPLOY_ENVIRONMENT}"

      - name: Bootstrap KMS and ECR
        run: |
          terraform -chdir="${TF_WORKING_DIR}" apply \
            -target=module.kms \
            -target=module.ecr \
            -auto-approve \
            -input=false \
            -no-color \
            -var="api_authorization_type=${API_AUTHORIZATION_TYPE}" \
            -var="project_name=${PROJECT_NAME}"

      - name: Capture currently deployed Lambda image
        id: capture-current-image
        run: |
          function_name="$(terraform -chdir="${TF_WORKING_DIR}" output -raw lambda_function_name 2>/dev/null || echo "${PROJECT_NAME}-${DEPLOY_ENVIRONMENT}-lambda")"
          previous_image_uri="$(aws lambda get-function-configuration \
            --function-name "${function_name}" \
            --query 'Code.ImageUri' \
            --output text 2>/dev/null || true)"
          echo "function_name=${function_name}" >> "${GITHUB_OUTPUT}"
          echo "previous_image_uri=${previous_image_uri}" >> "${GITHUB_OUTPUT}"

      - name: Terraform apply workload with configured Lambda image
        id: apply-workload
        run: |
          terraform -chdir="${TF_WORKING_DIR}" apply \
            -auto-approve \
            -input=false \
            -no-color \
            -var="api_authorization_type=${API_AUTHORIZATION_TYPE}" \
            -var="project_name=${PROJECT_NAME}" \
            -var="lambda_image_uri=${LAMBDA_IMAGE_URI}"

      - name: Read deployment outputs
        id: deployment-outputs
        run: |
          echo "api_gateway_invoke_url=$(terraform -chdir="${TF_WORKING_DIR}" output -raw api_gateway_invoke_url)" >> "${GITHUB_OUTPUT}"
          echo "api_gateway_health_url=$(terraform -chdir="${TF_WORKING_DIR}" output -raw api_gateway_health_url)" >> "${GITHUB_OUTPUT}"

      - name: Wait for Lambda update
        run: aws lambda wait function-updated --function-name "${{ steps.capture-current-image.outputs.function_name }}"

      - name: Smoke test Lambda health endpoint
        if: env.ENABLE_HTTP_VALIDATION == 'true'
        run: |
          health_url="${{ steps.deployment-outputs.outputs.api_gateway_health_url }}"
          if [ "${API_AUTHORIZATION_TYPE}" = "AWS_IAM" ]; then
            auth_args=(--aws-sigv4 "aws:amz:${AWS_REGION}:execute-api" --user "${AWS_ACCESS_KEY_ID}:${AWS_SECRET_ACCESS_KEY}")
            if [ -n "${AWS_SESSION_TOKEN:-}" ]; then
              auth_args+=(-H "x-amz-security-token: ${AWS_SESSION_TOKEN}")
            fi
            curl --fail --silent --show-error --max-time 20 "${auth_args[@]}" "${health_url}"
          else
            curl --fail --silent --show-error --max-time 20 "${health_url}"
          fi

      - name: Run DAST scan with OWASP ZAP
        if: env.ENABLE_DAST == 'true' && env.API_AUTHORIZATION_TYPE == 'NONE'
        uses: zaproxy/action-baseline@7c4deb10e6261301961c86d65d54a516394f9aed # v0.14.0
        with:
          target: ${{ steps.deployment-outputs.outputs.api_gateway_invoke_url }}
          fail_action: true
          allow_issue_writing: false
          artifact_name: zap-baseline-prod
          cmd_options: "-a -m 5 -I"

      - name: Skip unauthenticated DAST for IAM-protected API
        if: env.ENABLE_DAST == 'true' && env.API_AUTHORIZATION_TYPE != 'NONE'
        run: |
          echo "ENABLE_DAST is true, but API_AUTHORIZATION_TYPE=${API_AUTHORIZATION_TYPE}. OWASP ZAP baseline is skipped unless the API is explicitly public."

      - name: Roll back Lambda image on failed deployment validation
        if: failure() && steps.capture-current-image.outputs.previous_image_uri != '' && steps.capture-current-image.outputs.previous_image_uri != 'None'
        run: |
          previous_image_uri="${{ steps.capture-current-image.outputs.previous_image_uri }}"
          function_name="${{ steps.capture-current-image.outputs.function_name }}"
          aws lambda update-function-code \
            --function-name "${function_name}" \
            --image-uri "${previous_image_uri}"
          aws lambda wait function-updated --function-name "${function_name}"
          terraform -chdir="${TF_WORKING_DIR}" apply \
            -auto-approve \
            -input=false \
            -no-color \
            -var="api_authorization_type=${API_AUTHORIZATION_TYPE}" \
            -var="project_name=${PROJECT_NAME}" \
            -var="lambda_image_uri=${previous_image_uri}"
